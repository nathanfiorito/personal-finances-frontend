name: CI

on:
  push:
    branches:
      - 'feature/**'
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Skip push when PR already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # On pull_request events CI always runs.
          # On push: skip if a PR already exists for this branch,
          # so CI runs exactly once (via the PR sync event).
          # feature/** → develop, develop → main. main is never skipped.
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          BRANCH="${{ github.ref_name }}"

          if echo "$BRANCH" | grep -q "^feature/"; then
            BASE="develop"
          elif [ "$BRANCH" = "develop" ]; then
            BASE="main"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          COUNT=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "$BRANCH" \
            --base "$BASE" \
            --json number \
            --jq 'length')
          if [ "$COUNT" -gt 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  lint:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test

  build:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_API_BASE_URL: https://placeholder-api.example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  auto-pr:
    needs: [lint, test, build]
    if: |
      github.event_name == 'push' && (
        startsWith(github.ref_name, 'feature/') ||
        github.ref_name == 'develop'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.ref_name }}"

          if echo "$BRANCH" | grep -q "^feature/"; then
            BASE="develop"
            TITLE="${BRANCH#feature/}"
          else
            BASE="main"
            TITLE="Release: develop → main"
          fi

          EXISTING=$(gh pr list --head "$BRANCH" --base "$BASE" --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "PR already exists, skipping"
            exit 0
          fi

          gh pr create \
            --base "$BASE" \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "Automated PR — all CI checks passed."
